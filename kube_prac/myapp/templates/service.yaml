apiVersion: v1
kind: Service
metadata:
  # Service name based on chart fullname helper
  name: {{ include "myapp.fullname" . }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
spec:
  # Service type controlled via values.yaml (ClusterIP, NodePort, LoadBalancer)
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}   # External service port
      targetPort: http                   # Maps to containerPort named "http" in Deployment
      protocol: TCP
      name: http                         # Port name (used by probes and selectors)
  # Selector ensures Service routes traffic to Pods with matching labels
  selector:
    {{- include "myapp.selectorLabels" . | nindent 4 }}
