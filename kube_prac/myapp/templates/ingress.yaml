{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # Ingress name based on chart fullname
  name: {{ include "myapp.fullname" . }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Ingress controller class (e.g., nginx)
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}

  # TLS configuration (optional, controlled via values.yaml)
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}

  # Host and path routing rules
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}                # Path to match
            {{- with .pathType }}
            pathType: {{ . }}               # Path type (Prefix, Exact, ImplementationSpecific)
            {{- end }}
            backend:
              service:
                name: {{ include "myapp.fullname" $ }}   # Target Service name
                port:
                  number: {{ $.Values.service.port }}    # Target Service port
          {{- end }}
    {{- end }}
{{- end }}
