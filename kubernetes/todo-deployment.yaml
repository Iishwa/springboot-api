apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  labels:
    app: todo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
      - name: todo-api
        image: lishwar/springboot-api:latest   # your fresh Docker Hub image
        ports:
        - containerPort: 5000
        env:
        - name: SPRING_DATA_MONGODB_HOST
          value: mongo
        - name: SPRING_DATA_MONGODB_PORT
          value: "27017"
        - name: SPRING_DATA_MONGODB_DATABASE
          value: todo_db
        - name: SPRING_DATA_MONGODB_USERNAME
          value: admin
        - name: SPRING_DATA_MONGODB_PASSWORD
          value: password
        - name: SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE
          value: admin
      restartPolicy: Always
